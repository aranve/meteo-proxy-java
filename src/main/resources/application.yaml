spring:
  application:
    name: meteoproxy

springdoc:
  swagger-ui:
    disable-swagger-default-url: true

logging:
  level:
    org.zalando.logbook: TRACE

logbook:
  obfuscate:
    headers:
      - Authorization
  predicate:
    exclude:
      - path: '/actuator/health/**'

retry:
  max-attempts: 2
  delay-seconds: 2

external:
  open-meteo-api:
    url: 'https://api.open-meteo.com/v1/'

