spring:
  application:
    name: meteoproxy

springdoc:
  swagger-ui:
    disable-swagger-default-url: true

logging:
  level:
    org.zalando.logbook: TRACE

logbook:
  obfuscate:
    headers:
      - Authorization
  predicate:
    exclude:
      - path: '/actuator/health/**'

resilience4j:
  retry:
    instances:
      openMeteoApi:
        max-attempts: 2
        wait-duration: 2s
        retry-exceptions:
          - meteoproxy.domain.exception.ExternalApiException
  circuitbreaker:
    instances:
      openMeteoApi:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        automatic-transition-from-open-to-half-open-enabled: true
        permitted-number-of-calls-in-half-open-state: 3

cache:
  forecast:
    ttl-seconds: 60
    max-size: 5000

external:
  open-meteo-api:
    url: 'https://api.open-meteo.com/v1/'

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
