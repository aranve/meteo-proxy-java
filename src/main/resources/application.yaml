spring:
  application:
    name: meteoproxy

springdoc:
  swagger-ui:
    disable-swagger-default-url: true

logging:
  level:
    org.zalando.logbook: DEBUG

logbook:
  obfuscate:
    headers:
      - Authorization
  predicate:
    exclude:
      - path: '/actuator/health/**'

resilience4j:
  retry:
    instances:
      openMeteoApi:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - meteoproxy.domain.exception.ExternalApiException
  circuitbreaker:
    instances:
      openMeteoApi:
        failure-rate-threshold: 30
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 30s
        sliding-window-size: 20
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        record-exceptions:
          - meteoproxy.domain.exception.ExternalApiException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException

cache:
  forecast:
    ttl-seconds: 60
    max-size: 5000

external:
  open-meteo-api:
    url: 'https://api.open-meteo.com/v1/'

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
